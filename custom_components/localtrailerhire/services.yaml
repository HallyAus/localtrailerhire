send_message:
  name: Send Message
  description: Send a message to a customer for a specific booking transaction.
  fields:
    transaction_id:
      name: Transaction ID
      description: The UUID of the transaction to send the message to.
      required: true
      example: "12345678-1234-1234-1234-123456789abc"
      selector:
        text:
    message:
      name: Message
      description: The message content to send to the customer.
      required: true
      example: "Thank you for your booking! Your trailer is ready for pickup."
      selector:
        text:
          multiline: true
    config_entry_id:
      name: Config Entry
      description: Which Local Trailer Hire entry to use. Required only if multiple entries are configured.
      required: false
      selector:
        config_entry:
          integration: localtrailerhire

refresh_now:
  name: Refresh Now
  description: Force an immediate refresh of booking data. Refreshes all entries if none specified.
  fields:
    config_entry_id:
      name: Config Entry
      description: Which Local Trailer Hire entry to refresh. Omit to refresh all.
      required: false
      selector:
        config_entry:
          integration: localtrailerhire

mark_message_sent:
  name: Mark Message Sent
  description: Manually mark a transaction as having had a confirmation message sent. Use this to prevent duplicate messages after manual intervention.
  fields:
    transaction_id:
      name: Transaction ID
      description: The UUID of the transaction to mark as message sent.
      required: true
      example: "12345678-1234-1234-1234-123456789abc"
      selector:
        text:
    config_entry_id:
      name: Config Entry
      description: Which Local Trailer Hire entry to use. Required only if multiple entries are configured.
      required: false
      selector:
        config_entry:
          integration: localtrailerhire

fire_confirmed_events:
  name: Fire Confirmed Events
  description: Re-scan and fire booking_confirmed events for bookings in the last N hours. Useful for debugging automation triggers without sending messages.
  fields:
    hours_back:
      name: Hours Back
      description: How many hours back to scan for confirmed bookings (default 24).
      required: false
      default: 24
      example: 24
      selector:
        number:
          min: 1
          max: 168
          unit_of_measurement: hours
    config_entry_id:
      name: Config Entry
      description: Which Local Trailer Hire entry to use. Required only if multiple entries are configured.
      required: false
      selector:
        config_entry:
          integration: localtrailerhire

accept_booking:
  name: Accept Booking
  description: Accept a pending booking request. Calls the transition/accept transition on the Sharetribe transaction.
  fields:
    transaction_id:
      name: Transaction ID
      description: The UUID of the booking transaction to accept.
      required: true
      example: "12345678-1234-1234-1234-123456789abc"
      selector:
        text:
    config_entry_id:
      name: Config Entry
      description: Which Local Trailer Hire entry to use. Required only if multiple entries are configured.
      required: false
      selector:
        config_entry:
          integration: localtrailerhire

decline_booking:
  name: Decline Booking
  description: Decline a pending booking request. Calls the transition/decline transition on the Sharetribe transaction.
  fields:
    transaction_id:
      name: Transaction ID
      description: The UUID of the booking transaction to decline.
      required: true
      example: "12345678-1234-1234-1234-123456789abc"
      selector:
        text:
    config_entry_id:
      name: Config Entry
      description: Which Local Trailer Hire entry to use. Required only if multiple entries are configured.
      required: false
      selector:
        config_entry:
          integration: localtrailerhire
