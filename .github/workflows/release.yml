name: Release

# Creates a GitHub release whenever the manifest version is unreleased.
# Reads the tag from custom_components/localtrailerhire/manifest.json by
# default, or accepts an override via workflow_dispatch input. Builds a
# release-asset zip of the integration so HACS can install via release
# downloads (which are not subject to the 60/hr unauthenticated GitHub API
# rate limit that the /zipball endpoint hits).
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Override tag (default: read from manifest.json)"
        required: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine tag
        id: tag
        run: |
          INPUT="${{ github.event.inputs.tag }}"
          if [ -n "$INPUT" ]; then
            TAG="$INPUT"
          else
            VER=$(grep -oP '"version"\s*:\s*"\K[^"]+' custom_components/localtrailerhire/manifest.json)
            TAG="v$VER"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved tag: $TAG"

      - name: Check whether tag already exists
        id: check
        run: |
          if git rev-parse --verify "refs/tags/${{ steps.tag.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${{ steps.tag.outputs.tag }} already exists; skipping release."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build integration zip
        if: steps.check.outputs.exists == 'false'
        run: |
          cd custom_components/localtrailerhire
          zip -r "$GITHUB_WORKSPACE/localtrailerhire.zip" .
          ls -la "$GITHUB_WORKSPACE/localtrailerhire.zip"
          unzip -l "$GITHUB_WORKSPACE/localtrailerhire.zip" | head -20

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.tag }}
          target_commitish: main
          generate_release_notes: true
          files: localtrailerhire.zip
          body: |
            Home Assistant integration for the LocalTrailerHire (Sharetribe Flex)
            marketplace. Install via HACS — the attached `localtrailerhire.zip`
            is downloaded directly (no GitHub API rate limit).

            See the README for the full feature list and the sample dashboard
            at `dashboards/local_trailer_hire.yaml`.
