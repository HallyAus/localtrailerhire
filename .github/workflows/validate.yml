name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # ``brands`` requires an upstream PR to home-assistant/brands.
          # ``description`` and ``topics`` are repo settings on github.com
          # (Settings → top of repo page); the CI cannot fix them. Remove
          # these ignores once they're set. The HACS action splits this
          # value on whitespace, so use spaces (not commas).
          ignore: brands description topics
