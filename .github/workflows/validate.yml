name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run hassfest
        uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run HACS validation
        uses: hacs/action@main
        with:
          category: integration
          # ``brands`` requires an upstream PR to home-assistant/brands.
          # ``description`` and ``topics`` are repository-level settings on
          # github.com (Settings → top of repo page) that the CI cannot fix
          # itself. Remove these ignores once they're set.
          ignore: brands,description,topics
